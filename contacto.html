<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contacto | Dean Andrew</title>
  <meta name="description" content="Ponte en contacto con Dean Andrew para contrataciones y prensa.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top navbar-dark scrolled" id="mainNav">
    <div class="container">
       <a class="navbar-brand" href="index.html">
        <img src="img/dean-logo.jpg" alt="Dean Andrew Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="musica.html">Música</a></li>
          <li class="nav-item"><a class="nav-link" href="videos.html">Videos</a></li>
          <li class="nav-item"><a class="nav-link" href="eventos.html">Eventos</a></li>
          <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre Dean</a></li>
          <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="py-5 mt-5">
    <div class="container py-5 text-center">
      <h1 class="display-1 fw-bold">CONTACTO</h1>
      <p class="lead text-white-50">Hablemos de música.</p>
    </div>
  </header>

  <section class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="contact-form">
            <form action="#" method="POST">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="name" class="form-label text-white-50 small text-uppercase fw-bold">Nombre</label>
                  <input type="text" class="form-control" id="name" placeholder="Tu nombre" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="email" class="form-label text-white-50 small text-uppercase fw-bold">Correo Electrónico</label>
                  <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
                </div>
              </div>
              <div class="mb-4">
                <label for="message" class="form-label text-white-50 small text-uppercase fw-bold">Mensaje</label>
                <textarea class="form-control" id="message" rows="5" placeholder="Cuéntanos..." required></textarea>
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-light px-5 py-3 fw-bold">ENVIAR MENSAJE</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="row mt-5 pt-5 text-center">
        <div class="col-md-4 mb-4">
          <div class="h3"><i class="fas fa-envelope text-white"></i></div>
          <h5 class="fw-bold">EMAIL</h5>
          <p class="text-white-50">info@deanandrew.com</p>
        </div>
        <div class="col-md-4 mb-4">
          <div class="h3"><i class="fas fa-phone text-white"></i></div>
          <h5 class="fw-bold">TELÉFONO</h5>
          <p class="text-white-50">+504 0000-0000</p>
        </div>
        <div class="col-md-4 mb-4">
          <div class="h3"><i class="fas fa-map-marker-alt text-white"></i></div>
          <h5 class="fw-bold">LOCATION</h5>
          <p class="text-white-50">Tegucigalpa, Honduras</p>
        </div>
      </div>
    </div>
  </section>

  <footer class="text-center">
    <div class="container">
      <p class="text-white-50 mb-0"><strong>Dean Andrew Music &copy; 2024</strong></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
